name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  kalite:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lunara
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
      APP_SECRET: github-actions-icin-uzun-gizli-anahtar
      SOCKET_PORT: 3001
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Prisma istemcisini üret
        run: npm run prisma:generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
